<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   
        div.main{
            background-color: rgb(0, 0, 0);
            padding: 20px;
            border-radius: 5px;
            width: 60px;
        }
        div.red{
            height: 60px;
            width: 60px;
            border-radius: 50%;
            background-color: rgb(215, 210, 210);
            margin-top: 0px;
        }
        div.yellow{
            height: 60px;
            width: 60px;
            border-radius: 50%;     
            background-color: rgb(250, 250, 246);
            margin-top: 30px;
        }
        div.green{
            height:60px;
            width:60px;
            border-radius: 50%;
            background-color: rgb(22, 132, 22);
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="red"></div>
        <div class="yellow">
        </div>
        <div class="green"></div>


    </div>


   
</body>
</html>
